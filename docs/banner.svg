<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景渐变 -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#glow)"/>
  <rect width="1280" height="160" fill="url(#shine)"/>

  <!-- 左下装饰电路 -->
  <g stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5" fill="none" stroke-linecap="round">
    <line x1="60" y1="60" x2="180" y2="60"/>
    <line x1="180" y1="60" x2="180" y2="120"/>
    <line x1="60" y1="260" x2="140" y2="260"/>
    <line x1="140" y1="260" x2="140" y2="200"/>
    <circle cx="60" cy="60" r="3.5" fill="#ffffff" fill-opacity="0.4" stroke="none"/>
    <circle cx="180" cy="120" r="3.5" fill="#ffffff" fill-opacity="0.4" stroke="none"/>
    <circle cx="140" cy="200" r="3.5" fill="#ffffff" fill-opacity="0.4" stroke="none"/>
  </g>

  <!-- 右下装饰电路 -->
  <g stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5" fill="none" stroke-linecap="round">
    <line x1="1100" y1="260" x2="1220" y2="260"/>
    <line x1="1100" y1="260" x2="1100" y2="200"/>
    <line x1="1140" y1="60" x2="1220" y2="60"/>
    <circle cx="1220" cy="260" r="3.5" fill="#ffffff" fill-opacity="0.4" stroke="none"/>
    <circle cx="1100" cy="200" r="3.5" fill="#ffffff" fill-opacity="0.4" stroke="none"/>
    <circle cx="1140" cy="60" r="3.5" fill="#ffffff" fill-opacity="0.4" stroke="none"/>
  </g>

  <!-- 主标题 -->
  <text x="640" y="170" font-family="Helvetica, Arial, sans-serif"
        font-size="76" font-weight="800" fill="#ffffff"
        text-anchor="middle" letter-spacing="-2">ESP-AT Commander</text>

  <!-- 副标题 -->
  <text x="640" y="220" font-family="Helvetica, Arial, sans-serif"
        font-size="20" font-weight="400" fill="#ffffff" fill-opacity="0.78"
        text-anchor="middle" letter-spacing="4">ESP32 / ESP8266 AT COMMAND DEBUGGER</text>
</svg>
