<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 紫色径向渐变,左上次亮,右下最暗 -->
    <radialGradient id="bg" cx="32%" cy="28%" r="95%">
      <stop offset="0%" stop-color="#7a72f5"/>
      <stop offset="55%" stop-color="#4f44e0"/>
      <stop offset="100%" stop-color="#3228a8"/>
    </radialGradient>
    <!-- 字母的微妙高光 -->
    <linearGradient id="atText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0eeff"/>
    </linearGradient>
    <!-- 顶部玻璃反光 -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 背景圆角方块 -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- 顶部玻璃反光(质感,非渐变) -->
  <rect width="1024" height="380" rx="220" fill="url(#shine)"/>

  <!-- AT 字标 - 居中 -->
  <text x="512" y="650"
        font-family="Helvetica, Arial, sans-serif"
        font-size="420"
        font-weight="900"
        fill="url(#atText)"
        text-anchor="middle"
        letter-spacing="-14">AT</text>
</svg>
