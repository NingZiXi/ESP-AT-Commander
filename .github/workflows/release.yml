name: Release Build

on:
  push:
    tags:
      - "v*"

env:
  PRODUCT_NAME: "ESP-AT Commander"
  RUST_BACKTRACE: 1

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-22.04
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install

      - name: Install frontend dependencies
        run: cd frontend && pnpm install

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libgtk-3-dev libayatana-appindicator3-dev libwebkit2gtk-4.1-dev

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "${{ env.PRODUCT_NAME }} ${{ github.ref_name }}"
          releaseBody: |
            ## ${{ env.PRODUCT_NAME }} ${{ github.ref_name }}

            A desktop AT command debugger for ESP32 / ESP8266.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows | `*-x64-setup.exe` |
            | macOS | `*.dmg` |
            | Linux | `*.AppImage` |

            ### Build from source
            ```bash
            git clone https://github.com/NingZiXi/ESP-AT-Commander.git
            cd ESP-AT-Commander
            pnpm install
            pnpm tauri:build
            ```
          releaseDraft: true
          prerelease: false
