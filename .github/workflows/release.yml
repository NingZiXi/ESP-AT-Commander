name: Release Build

on:
  push:
    tags:
      - "v*"

env:
  PRODUCT_NAME: "ESP-AT Commander"
  RUST_BACKTRACE: 1

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x64
            artifact: "*-x64-setup.exe"
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: "*.dmg"
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: "*.dmg"
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: "*.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "${{ env.PRODUCT_NAME }} ${{ github.ref_name }}"
          releaseBody: |
            ## ${{ env.PRODUCT_NAME }} ${{ github.ref_name }}

            A desktop AT command debugger for ESP32 / ESP8266.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows | `*-x64-setup.exe` |
            | macOS (Apple Silicon) | `*-aarch64.dmg` |
            | macOS (Intel) | `*-x64.dmg` |
            | Linux | `*.AppImage` |

            ### What's new
            See the [commits](https://github.com/NingZiXi/ESP-AT-Commander/commits/${{ github.ref_name }}) for changes.

            ### Build from source
            ```bash
            git clone https://github.com/NingZiXi/ESP-AT-Commander.git
            cd ESP-AT-Commander
            pnpm install
            pnpm tauri:build
            ```
          releaseDraft: true
          prerelease: false
